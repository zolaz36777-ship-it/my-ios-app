workflows:
  ios-pwabuilder-build:
    name: PWABuilder iOS App Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    working_directory: src
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          pod install
      - name: Build iOS Application
        script: |
          xcodebuild -workspace habesha4habesha.xcworkspace -scheme PWA -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO OBJROOT=$PWD/build SYMROOT=$PWD/build
      - name: Package App Bundle into IPA
        script: |
          mkdir -p build/Payload
          cp -r build/Debug-iphoneos/*.app build/Payload/
          cd build && zip -r habesha_app.ipa Payload
    artifacts:
      - src/build/*.ipa
